<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tanvixa | Find Smart Gadgets by Product Code</title>

    <meta name="description" content="Search featured smart gadgets by product code and discover the exact products shown in our videos.">

    <meta name="keywords" content="smart gadgets, tech gadgets, gadget finder, product code search">

    <meta name="author" content="Tanvixa">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <h1>Tanvixa</h1>
    <p>Find Any Featured Gadget by Product Code</p>
</header>

<section class="search-section">

    <p class="search-info">
        Enter the product code from our video to quickly find the featured gadget.
    </p>

    <input
        type="text"
        id="searchInput"
        placeholder="Enter Product Code (Example: GL001)"
        onkeypress="if(event.key==='Enter'){searchProduct();}"
    >

    <button onclick="searchProduct()">
        Search
    </button>

</section>

<div id="result"></div>

<script src="script.js"></script>

</body>
</html>
